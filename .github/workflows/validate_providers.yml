name: Validate providers (EDGAR vs Yahoo)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backfill EDGAR data (universe EUA)
        run: |
          python scripts/edgar_backfill.py

      - name: Verify EDGAR backfill produced data
        run: |
          echo "Normalized files:"
          find data/edgar/normalized -name "*.json" 2>/dev/null | wc -l
          echo "Sample:"
          find data/edgar/normalized -name "*.json" 2>/dev/null | head

          COUNT=$(find data/edgar/normalized -name "*.json" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: EDGAR backfill produced no normalized files"
            echo "Comprova: 1) USER_AGENT real a ticker_to_cik.py  2) connectivitat a data.sec.gov  3) que aquest pas s'executa abans de la validació"
            exit 1
          fi

      - name: DEBUG - dump AAPL/MSFT/JNJ/JPM FY records
        run: |
          python scripts/debug_dump.py AAPL MSFT JNJ JPM

      - name: Run provider validation (Prova 5)
        run: |
          python scripts/validate_providers.py

      - name: Show report
        run: |
          cat reports/edgar_validation.md

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgar-validation-report
          path: reports/edgar_validation.md
          retention-days: 30
