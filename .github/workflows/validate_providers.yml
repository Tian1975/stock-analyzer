name: Validate providers (EDGAR vs Yahoo)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run provider validation (Prova 5)
        run: |
          python scripts/validate_providers.py

      - name: Show report
        run: |
          cat reports/edgar_validation.md

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgar-validation-report
          path: reports/edgar_validation.md
          retention-days: 30
