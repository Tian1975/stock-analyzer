name: One-off Backfill Full Year

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill (one-off, may take a few minutes)
        run: |
          python src/backfill_full_year.py

      - name: Verify result
        run: |
          echo "Nombre de fitxers a data/history/scores/:"
          ls data/history/scores/ | wc -l

      - name: Commit and push
        run: |
          git add -A data/history/
          git status
          git diff --cached --quiet || git commit -m "One-off: backfill historial de l'any (tècnica + fonamentals congelats)"
          git push origin main
